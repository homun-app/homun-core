name: Build installers

# Builds native installers for macOS, Windows and Linux.
# - Triggered on version tags (v*) -> each runner builds + PUBLISHES its installer
#   and electron-updater metadata (latest*.yml) to a DRAFT release in the public
#   `homun-releases` repo (electron-builder --publish always). Review the draft
#   there and publish it; that same release is the auto-update feed.
# - Triggered manually (workflow_dispatch) -> builds + uploads artifacts only
#   (--publish never), handy for verifying the pipeline without cutting a version.
#
# Each runner builds its OWN native gateway binary (cargo --release) and bundles
# it into the app, so an installer is only valid for the OS/arch that produced it.
#
# Security note: no untrusted github.event.* input is interpolated into run:
# steps. The only ${{ }} expressions inside commands are secrets and matrix
# values, both trusted/controlled here -> no workflow-injection surface.

on:
  push:
    tags:
      - "v*"
  # PRs to main build all three platforms as UNSIGNED, NON-publishing artifacts
  # (every `--publish` below is gated on a `v*` tag ref, so a PR never publishes a
  # release). This is the cross-platform compile+package validation: it proves the
  # gateway + app build on macOS, Windows and Linux before merge.
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read # publishing goes to homun-releases via RELEASES_TOKEN, not GITHUB_TOKEN

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # Apple Silicon -> arm64 gateway + arm64 app
            platform: mac
          - os: windows-latest # x64
            platform: win
          - os: ubuntu-22.04 # older glibc -> broader Linux compatibility
            platform: linux
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Linux build deps
        if: matrix.platform == 'linux'
        # Insurance for any transitive native-tls/openssl dep in the gateway tree.
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Install npm deps
        working-directory: apps/desktop
        run: npm ci

      # On a release tag the git tag is the single source of truth for the
      # version: stamp it into package.json so the installers AND the latest*.yml
      # auto-update metadata all match the tag. (electron-builder reads the
      # version from package.json, never from the tag — without this they drift.)
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: apps/desktop
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Prepare resources (vite build + gateway release binary)
        working-directory: apps/desktop
        run: npm run package:prepare

      # Gate signing on a run-step output, not a job-level `env` expression:
      # `${{ secrets.X != '' }}` in job env is unreliable for step `if` and was
      # evaluating false even with the secret set (v0.1.0 shipped unsigned). In a
      # run step the secret is reliably available as an env var.
      - name: Detect macOS signing creds
        id: signing
        if: matrix.platform == 'mac'
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
        run: |
          if [ -n "$MAC_CSC_LINK" ]; then
            echo "has_cert=true" >> "$GITHUB_OUTPUT"
            echo "Developer ID cert present (${#MAC_CSC_LINK} chars) -> signed + notarized build"
          else
            echo "has_cert=false" >> "$GITHUB_OUTPUT"
            # Never publish an UNSIGNED build to the auto-update feed: on a release
            # tag, refuse outright (an unsigned update breaks electron-updater's
            # signature anchor and is a silent-code-execution risk). Unsigned is
            # only allowed for dispatch test runs, which don't publish anyway.
            if [ "${GITHUB_REF}" != "${GITHUB_REF#refs/tags/v}" ]; then
              echo "::error::Refusing to cut an UNSIGNED macOS release. Set MAC_CSC_LINK before tagging."
              exit 1
            fi
            echo "No MAC_CSC_LINK secret -> unsigned build (dispatch only; will not publish)"
          fi

      - name: Build installer (macOS · signed + notarized)
        # Only on a release tag: signing + Apple notarization is slow and only the
        # tag run publishes. PRs/dispatch take the fast unsigned path below.
        if: matrix.platform == 'mac' && steps.signing.outputs.has_cert == 'true' && startsWith(github.ref, 'refs/tags/v')
        working-directory: apps/desktop
        run: npx electron-builder --mac --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }} -c.mac.notarize=true
        env:
          # Only the signed+notarized mac build feeds the auto-update channel, so
          # the publish token lives ONLY on this step (not job-wide, where every
          # `npm ci` postinstall could read it) and ONLY on tag runs.
          GH_TOKEN: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.RELEASES_TOKEN || '' }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify signed nested helper and notarized app
        if: matrix.platform == 'mac' && steps.signing.outputs.has_cert == 'true' && startsWith(github.ref, 'refs/tags/v')
        working-directory: apps/desktop
        shell: bash
        run: |
          APP_PATH="$(find dist-installers -maxdepth 3 -type d -name Homun.app -print -quit)"
          test -n "$APP_PATH"
          npm run verify:host-computer-package -- --app "$APP_PATH"

      # macOS unsigned: build as artifact only, never publish — an unsigned mac
      # build must not reach the signed auto-update channel. Runs when no Apple cert
      # is configured, OR on any non-tag build (PR/dispatch) where the fast unsigned
      # path is what we want for cross-platform validation.
      - name: Build installer (macOS · unsigned — no cert or non-release build)
        if: matrix.platform == 'mac' && (steps.signing.outputs.has_cert != 'true' || !startsWith(github.ref, 'refs/tags/v'))
        working-directory: apps/desktop
        run: npx electron-builder --mac --publish never -c.mac.identity=null
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # Windows: sign with the Certum SimplySign cloud cert when possible (best-effort),
      # otherwise publish UNSIGNED download-only. Unsigned stays SAFE because the app never
      # auto-installs an unsigned binary — on Windows/Linux the updater is notify-only and
      # opens the releases page for a manual download (main.cjs CAN_AUTO_INSTALL). SimplySign
      # login is a fragile tray-GUI flow, so the login AND the signed build both
      # continue-on-error and fall through to the unsigned path — a signing hiccup must never
      # block a release. Recipe + secrets: docs/windows-signing.md. (Linux stays unsigned.)
      - name: SimplySign install + headless login (Windows)
        id: winsign
        if: matrix.platform == 'win' && startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        shell: pwsh
        env:
          SIMPLYSIGN_TOTP_SEED: ${{ secrets.SIMPLYSIGN_TOTP_SEED }}
          SIMPLYSIGN_LOGIN: ${{ secrets.SIMPLYSIGN_LOGIN }}
        run: |
          $url = "https://files.certum.eu/software/SimplySignDesktop/Windows/9.4.4.92/SimplySignDesktop-9.4.4.92-64-bit-en.msi"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\simplysign.msi"
          $p = Start-Process "msiexec.exe" -ArgumentList "/i","`"$env:RUNNER_TEMP\simplysign.msi`"","/quiet","/norestart" -PassThru
          if (-not $p.WaitForExit(180000)) { try { $p.Kill() } catch {}; throw "msiexec timed out" }
          if ($p.ExitCode -ne 0) { throw "msiexec exit $($p.ExitCode)" }
          ./scripts/simplysign-login.ps1
          "signed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build installer (Windows · signed)
        id: winbuild_signed
        if: matrix.platform == 'win' && steps.winsign.outputs.signed == 'true'
        continue-on-error: true
        working-directory: apps/desktop
        shell: pwsh
        env:
          GH_TOKEN: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.RELEASES_TOKEN || '' }}
        run: |
          # pwsh array splatting keeps the spaced cert subject as ONE argv element (no quoting
          # hell). electron-builder 25 moved these under win.signtoolOptions.
          # Use the built-in env var (not ${{ github.ref }} interpolation) to avoid injection.
          $publish = if ($env:GITHUB_REF.StartsWith("refs/tags/v")) { "always" } else { "never" }
          $eb = @(
            "electron-builder","--win",
            "-c.win.signtoolOptions.certificateSubjectName=Open Source Developer Fabio Cantone",
            "-c.win.signtoolOptions.publisherName=Open Source Developer Fabio Cantone",
            "-c.win.signtoolOptions.rfc3161TimeStampServer=http://time.certum.pl",
            "--publish",$publish
          )
          npx @eb
          if ($LASTEXITCODE -ne 0) { throw "signed win build failed ($LASTEXITCODE)" }

      - name: Build installer (Windows · unsigned download-only — fallback)
        if: matrix.platform == 'win' && (steps.winsign.outputs.signed != 'true' || steps.winbuild_signed.outcome == 'failure')
        working-directory: apps/desktop
        run: npx electron-builder --win --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.RELEASES_TOKEN || '' }}

      - name: Build installer (Linux · unsigned, download-only)
        if: matrix.platform == 'linux'
        working-directory: apps/desktop
        run: npx electron-builder --linux --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.RELEASES_TOKEN || '' }}

      # Keep a copy of the raw installers as workflow artifacts too — useful for
      # inspecting dispatch (non-tag) runs that don't publish a release.
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: homun-${{ matrix.platform }}
          path: |
            apps/desktop/dist-installers/*.dmg
            apps/desktop/dist-installers/*.zip
            apps/desktop/dist-installers/*.exe
            apps/desktop/dist-installers/*.AppImage
            apps/desktop/dist-installers/*.deb
          if-no-files-found: error
