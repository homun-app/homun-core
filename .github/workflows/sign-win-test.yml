# Isolated harness to bring up Certum SimplySign signing on a Windows CI runner,
# WITHOUT touching the real release pipeline (build.yml). Run it by hand
# (workflow_dispatch), iterate on the fragile GUI-login automation until a test
# .exe signs + verifies, THEN fold the proven steps into build.yml's win job.
#
# Why Windows (not a Linux osslsigncode job): signtool + the SimplySign virtual
# smart card is Certum's supported path and sidesteps the libp11/PKCS#11
# CKR_FUNCTION_FAILED wall we hit locally. Signing on the same runner as the build
# also keeps electron-updater's latest.yml hash correct once integrated.
#
# Required repo secrets:
#   SIMPLYSIGN_TOTP_SEED   Base32 TOTP secret (from the setup QR's otpauth:// URI)
#   SIMPLYSIGN_LOGIN       SimplySign login (email)
# The SimplySign Desktop MSI URL is public (hardcoded in the download step) — no secret.
# No PIN: the token reports pin min/max 0/0; signing is authorized by the logged-in
# session (email + OTP). If a CI run proves otherwise, add SIMPLYSIGN_PIN then.
name: sign-win-test

on:
  workflow_dispatch:
    inputs:
      exe_url:
        description: "URL of a .exe to sign (defaults to the v0.1.1056 release build)"
        required: false
        default: "https://github.com/homun-app/homun-releases/releases/download/v0.1.1056/Homun-0.1.1056-x64.exe"

permissions:
  contents: read

jobs:
  sign-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download SimplySign Desktop (MSI)
        shell: pwsh
        run: |
          # Public Certum download — the 64-bit MSI. msiexec installs it silently (no GUI, no
          # hang). The .exe installer (270 MB, InstallShield) does not honour /VERYSILENT.
          $url = "https://files.certum.eu/software/SimplySignDesktop/Windows/9.4.4.92/SimplySignDesktop-9.4.4.92-64-bit-en.msi"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\simplysign.msi"

      - name: Install SimplySign Desktop (silent MSI)
        shell: pwsh
        run: |
          $msi = "$env:RUNNER_TEMP\simplysign.msi"
          Write-Host "msi: $([math]::Round((Get-Item $msi).Length/1MB,1)) MB"
          $p = Start-Process "msiexec.exe" -ArgumentList "/i","`"$msi`"","/quiet","/norestart" -PassThru
          # Timeout guard: never block unbounded (a prompt would hang the job for 6h).
          if (-not $p.WaitForExit(180000)) { try { $p.Kill() } catch {}; throw "msiexec did not finish in 180s" }
          Write-Host "msiexec exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { throw "msiexec failed ($($p.ExitCode))" }
          Start-Sleep -Seconds 8
          Write-Host "=== SimplySignDesktop.exe found under: ==="
          Get-ChildItem "C:\Program Files","C:\Program Files (x86)","$env:LOCALAPPDATA","C:\ProgramData" `
            -Recurse -Depth 5 -Filter "SimplySignDesktop.exe" -ErrorAction SilentlyContinue |
            Select-Object -ExpandProperty FullName

      - name: Headless SimplySign login (OTP + SendKeys)
        shell: pwsh
        env:
          SIMPLYSIGN_TOTP_SEED: ${{ secrets.SIMPLYSIGN_TOTP_SEED }}
          SIMPLYSIGN_LOGIN: ${{ secrets.SIMPLYSIGN_LOGIN }}
        run: ./scripts/simplysign-login.ps1

      - name: Download the test executable
        shell: pwsh
        env:
          # Via env (not inline ${{ }}): exe_url is a user-supplied dispatch input.
          EXE_URL: ${{ inputs.exe_url }}
        run: Invoke-WebRequest -Uri $env:EXE_URL -OutFile "$env:RUNNER_TEMP\test.exe"

      - name: Sign with signtool
        shell: pwsh
        run: |
          # signtool ships with the Windows SDK on windows-latest.
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                       Sort-Object FullName | Select-Object -Last 1).FullName
          Write-Host "signtool: $signtool"
          # $env:THUMBPRINT was exported by the login script. No PIN: the SimplySign
          # session (email + OTP) authorizes signing. If signtool ever fails needing a
          # PIN, supply it at SimplySign Desktop login (add to the login script) instead.
          & $signtool sign `
            /sha1 $env:THUMBPRINT `
            /fd sha256 /td sha256 `
            /tr http://time.certum.pl `
            "$env:RUNNER_TEMP\test.exe"
          if ($LASTEXITCODE -ne 0) { throw "signtool sign failed ($LASTEXITCODE)" }

      - name: Verify signature
        shell: pwsh
        run: |
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                       Sort-Object FullName | Select-Object -Last 1).FullName
          & $signtool verify /pa /v "$env:RUNNER_TEMP\test.exe"

      - name: Upload signed exe
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: signed-test-exe
          path: ${{ runner.temp }}/test.exe

      - name: Screenshot on failure (debug the GUI login)
        if: failure()
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Windows.Forms,System.Drawing
          $b = [System.Windows.Forms.SystemInformation]::VirtualScreen
          $bmp = New-Object System.Drawing.Bitmap $b.Width, $b.Height
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.CopyFromScreen($b.Location, [System.Drawing.Point]::Empty, $b.Size)
          $bmp.Save("$env:RUNNER_TEMP\screen.png")

      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: login-screenshot
          path: ${{ runner.temp }}/screen.png
