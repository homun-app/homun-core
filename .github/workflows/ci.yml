name: CI

# Lightweight validation gate for pull requests (and post-merge on main).
# Deliberately uses NO secrets and a read-only token: PRs from forks run with a
# read-only GITHUB_TOKEN, so keeping this workflow secret-free means a malicious
# fork PR can never exfiltrate signing credentials. The heavy, signed installer
# build lives in build.yml and only runs on version tags / manual dispatch.
#
# Security note: the only ${{ }} expressions here are in the concurrency key
# (github.workflow / github.ref — trusted context values, not run: commands),
# so there is no workflow-injection surface.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install deps
        working-directory: apps/desktop
        run: npm ci

      - name: Typecheck
        working-directory: apps/desktop
        run: npm run typecheck

      - name: Build (vite)
        working-directory: apps/desktop
        run: npm run build

  backend:
    name: Backend (build + gateway tests)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Compile workspace
        run: cargo build --workspace --locked

      - name: Test gateway
        run: cargo test -p local-first-desktop-gateway --locked
