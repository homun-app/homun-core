name: CI

# =============================================================================
# Self-hosted CI (Sprint 10 post-v1.0.1 — billing-free setup)
# =============================================================================
# Runs on a Docker self-hosted runner (myoung34/github-runner) on the dev Mac.
# Cost: €0/month. Always-on while Docker Desktop is up.
#
# Workspace at ~/.homun-runner/work persists between jobs → target/ cache
# survives without needing actions/cache (faster than GitHub-hosted setup).
#
# Heavy workflows (sandbox-validation, e2e cross-OS, release builds) live in
# release.yml + workflow_dispatch — they don't run on every PR.
#
# Skip CI for doc-only changes via paths-ignore.
# =============================================================================

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'
      - 'LICENSE*'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'
      - 'LICENSE*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (default features)
        run: cargo clippy -- -D warnings

      - name: Clippy (all features)
        run: cargo clippy --all-features -- -D warnings

  test:
    name: Test
    runs-on: [self-hosted, linux]
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests (all features)
        run: cargo test --all-features --verbose

  feature-test:
    name: Test Features
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, linux]
    needs: check
    strategy:
      fail-fast: false
      matrix:
        features:
          - "web-ui"
          - "gateway"
          - "full"
          - "default"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build with features
        env:
          FEATURES: ${{ matrix.features }}
        run: |
          if [ "$FEATURES" = "default" ]; then
            cargo build --release
          else
            cargo build --release --no-default-features --features "$FEATURES"
          fi

      - name: Check binary size
        env:
          FEATURES: ${{ matrix.features }}
        shell: bash
        run: |
          if [ -f target/release/homun ]; then
            SIZE=$(ls -lh target/release/homun | awk '{print $5}')
            echo "Binary size with features '$FEATURES': $SIZE"
          fi
