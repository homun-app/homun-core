name: CI

# Lightweight validation gate for pull requests (and post-merge on main).
# Deliberately uses NO secrets and a read-only token: PRs from forks run with a
# read-only GITHUB_TOKEN, so keeping this workflow secret-free means a malicious
# fork PR can never exfiltrate signing credentials. The heavy, signed installer
# build lives in build.yml and only runs on version tags / manual dispatch.
#
# Security note: the only ${{ }} expressions here are in the concurrency key
# (github.workflow / github.ref — trusted context values, not run: commands),
# so there is no workflow-injection surface.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install deps
        working-directory: apps/desktop
        run: npm ci

      # `build` is `tsc --noEmit && vite build`, so it already typechecks —
      # no separate typecheck step needed (would run tsc twice).
      - name: Build (typecheck + vite)
        working-directory: apps/desktop
        run: npm run build

      - name: Electron shell unit tests
        working-directory: apps/desktop
        run: npm run test:electron

  backend:
    name: Backend (build + gateway tests)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Compile workspace
        run: cargo build --workspace --locked

      - name: Test gateway
        run: cargo test -p local-first-desktop-gateway --locked

  landlock-fence:
    # Runtime validation of the ADR 0023 Linux Landlock fence. ubuntu-24.04 has
    # Landlock in the active LSM stack (22.04 ships the kernel but not always the
    # enabled LSM), so the integration test's assertions actually run here. The
    # `linux_sandbox` suite covers BOTH policies (ADR 0023 #2): under workspace-write
    # an out-of-workspace write MUST be denied while an in-workspace write succeeds,
    # and under read-only (no writable roots) EVERY write — even into the cwd — MUST
    # be denied. `--nocapture` makes the enforce/skip outcome visible in the log, and
    # a broken fence (compiles but doesn't deny) turns this job RED instead of
    # silently passing.
    name: Landlock fence validation (ubuntu-24.04)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Kernel + active LSMs
        run: |
          echo "kernel: $(uname -r)"
          echo "active LSMs: $(cat /sys/kernel/security/lsm 2>/dev/null || echo unknown)"

      - name: Landlock fence integration test (visible)
        run: cargo test -p local-first-desktop-gateway --locked --test linux_sandbox -- --nocapture
