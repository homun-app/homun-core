<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Computer</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0b0d12; overflow: hidden; }
    /* noVNC mounts its canvas inside #screen; scaleViewport fits the whole
       framebuffer into this box (letterboxed), so the embedder just sizes the
       iframe and we always show the full screen, proportioned. */
    #screen { width: 100vw; height: 100vh; }
    #status {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; color: #8b94a3; font: 13px/1.4 system-ui, sans-serif;
      pointer-events: none;
    }
    #status[hidden] { display: none; }
  </style>
</head>
<body>
  <div id="screen"></div>
  <div id="status">Connessione al computer…</div>
  <script type="module" src="./lfpa-view.js"></script>
</body>
</html>
