<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Computer</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0b0d12; overflow: hidden; }
    /* noVNC mounts its canvas inside #screen; scaleViewport fits the whole
       framebuffer into this box (letterboxed), so the embedder just sizes the
       iframe and we always show the full screen, proportioned. */
    #screen { width: 100vw; height: 100vh; }
    #status {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; color: #8b94a3; font: 13px/1.4 system-ui, sans-serif;
      pointer-events: none;
    }
    #status[hidden] { display: none; }
  </style>
</head>
<body>
  <div id="screen"></div>
  <div id="status">Connessione al computer…</div>
  <script type="module">
    // Minimal, chrome-free noVNC embed used by the in-app "Computer" panel.
    // Uses the RFB core directly so we control scaling (no toolbar/status bar).
    import RFB from './core/rfb.js';

    const params = new URLSearchParams(location.search);
    // view_only defaults ON; pass view_only=0 to allow input (future interactive mode).
    const viewOnly = !['0', 'false'].includes((params.get('view_only') ?? '1').toLowerCase());
    const status = document.getElementById('status');

    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const url = `${proto}://${location.host}/websockify`;

    let rfb = null;
    function connect() {
      status.hidden = false;
      status.textContent = 'Connessione al computer…';
      rfb = new RFB(document.getElementById('screen'), url, { shared: true });
      // Scale the remote framebuffer to fit the container, preserve aspect ratio,
      // never clip; do not ask the server to resize its display.
      rfb.viewOnly = viewOnly;
      rfb.scaleViewport = true;
      rfb.clipViewport = false;
      rfb.resizeSession = false;
      rfb.background = '#0b0d12';
      rfb.addEventListener('connect', () => { status.hidden = true; });
      rfb.addEventListener('disconnect', () => {
        status.hidden = false;
        status.textContent = 'Riconnessione…';
        // x11vnc runs with -forever -shared, so reconnecting is safe.
        setTimeout(connect, 1200);
      });
    }
    connect();
  </script>
</body>
</html>
