# Portable self-host for Homun. Works as-is with `docker compose up`, and is the
# same contract every self-hosted PaaS consumes (Coolify/Dokku/CapRover/Kamal
# can import this or just build the Dockerfile). See docs/self-host.md.

services:
  homun:
    build:
      context: .
      args:
        # Empty URL => the SPA calls the API at its own origin. The token is NOT
        # baked in — the web login prompts for it (you enter HOMUN_DESKTOP_GATEWAY_TOKEN).
        VITE_HOMUN_DESKTOP_GATEWAY_URL: ""
    # image: ghcr.io/homun-app/homun:latest   # or pull a prebuilt image instead of building
    restart: unless-stopped
    environment:
      HOMUN_DESKTOP_GATEWAY_HOST: "0.0.0.0"
      HOMUN_DESKTOP_GATEWAY_PORT: "18765"
      HOMUN_WEB_DIR: "/app/web"
      HOMUN_DATA_DIR: "/data"
      HOMUN_DESKTOP_GATEWAY_TOKEN: "${HOMUN_DESKTOP_GATEWAY_TOKEN:?set a strong token in .env}"
      # Inference: point at cloud APIs or an Ollama URL (provider config is all env).
      # e.g. HOMUN_EMBED_BASE: "http://ollama:11434"
      # --- Contained computer (browser/sandbox) — optional; also uncomment the
      #     docker.sock mount below. The gateway runs the CC as a sibling on this
      #     network and reaches it by name. ---
      # HOMUN_CC_NETWORK: "homun-net"
      # HOMUN_CC_VALIDATE_HOST: "homun-cc"
      # HOMUN_CONTAINED_COMPUTER_CDP: "http://homun-cc:9222"
      # HOMUN_CONTAINED_COMPUTER_NOVNC: "http://homun-cc:6080/vnc.html"
      # HOMUN_WHISPER_URL: "http://homun-cc:9100"
    ports:
      - "18765:18765"
    networks:
      - homun-net
    volumes:
      - homun-data:/data
      # Optional: enable the "contained computer" by giving the gateway the host
      # Docker. Privileged — only on a box you own. See docs/self-host.md.
      # - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18765/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  homun-net:
    name: homun-net

volumes:
  homun-data:
