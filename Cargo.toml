[package]
name = "homun"
version = "1.0.0"
edition = "2021"
rust-version = "1.85"
description = "Ultra-lightweight personal AI assistant — a digital homunculus in your computer"
license = "PolyForm-Noncommercial-1.0.0"
repository = "https://github.com/homun-app/homun"
keywords = ["ai", "agent", "assistant", "bot", "skills"]
categories = ["command-line-utilities"]

[[bin]]
name = "homun"
path = "src/main.rs"

# =============================================================================
# FEATURE FLAGS
# =============================================================================
# 
# Build variants:
#   cargo build --release                              # Core (~15MB)
#   cargo build --release --features gateway            # Gateway (~40MB)
#   cargo build --release --features full               # Full (~50MB)
#
[features]
default = ["cli", "web-ui", "file-tools", "shell-tool", "web-tools", "cron-tool", "message-tool", "vault-2fa", "mcp", "browser"]

# === Core Features ===
cli = ["dep:clap", "dep:ratatui", "dep:crossterm"]
web-ui = ["cli", "mcp", "browser", "dep:axum", "dep:tower", "dep:tower-http", "dep:rust-embed", "dep:mime_guess", "dep:pulldown-cmark",
           "dep:tokio-rustls", "dep:rustls-pki-types", "dep:rcgen", "dep:hyper-util"]
file-tools = []
shell-tool = []
web-tools = []
cron-tool = []
message-tool = []

# === Channels (optional) ===
channel-telegram = ["dep:frankenstein"]
channel-discord = ["dep:serenity"]
channel-whatsapp = ["dep:wa-rs", "dep:wa-rs-sqlite-storage", "dep:wa-rs-tokio-transport",
                    "dep:wa-rs-ureq-http", "dep:wa-rs-core", "dep:wa-rs-proto", "dep:futures-util"]
channel-email = ["dep:lettre", "dep:mail-parser", "dep:async-imap", "dep:tokio-rustls", "dep:webpki-roots", "dep:rustls-pki-types"]
channel-webhook = []  # Built-in, uses axum

# === Providers (optional enhancements) ===
providers-openai-compat = ["dep:eventsource-stream", "dep:pin-project-lite"]

# === Advanced Features ===
embeddings = ["dep:usearch", "dep:lru", "dep:pdf-extract", "dep:calamine", "dep:zip", "dep:quick-xml"]
browser = ["mcp"]
mcp = ["dep:rmcp"]
vault-2fa = ["dep:totp-rs"]

# === Meta Features ===
gateway = ["cli", "web-ui", "file-tools", "shell-tool", "web-tools", "cron-tool", "message-tool",
           "channel-telegram", "channel-discord", "channel-whatsapp", "channel-email", "channel-webhook",
           "providers-openai-compat", "embeddings", "mcp"]

full = ["gateway", "browser", "vault-2fa"]

docker = ["gateway", "browser", "vault-2fa"]

[dependencies]
# =============================================================================
# CORE DEPENDENCIES (always required)
# =============================================================================
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# HTTP client (for providers and tools)
reqwest = { version = "0.13", default-features = false, features = ["json", "stream", "rustls", "query", "form", "multipart"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "1.0"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1"
thiserror = "2"

# Skill frontmatter parsing
gray_matter = "0.2"

# Time
chrono = { version = "0.4", features = ["serde"] }
qrcodegen = "1.8"

# UUID for session/message IDs
uuid = { version = "1", features = ["v4"] }

# Semver parsing for update checker (UPD-1, Sprint 9)
# Already transitively present in the dep tree — declaring as a direct dep
# makes the usage explicit and allows `use semver::Version` in our code.
semver = "1"

# Directories
dirs = "6"

# Hostname for runtime info
hostname = "0.4"
whoami = "1.5"

# Security - Encrypted secrets storage (core)
ring = "0.17"
base64 = "0.22"
sha2 = "0.10"
# TLS: rustls requires explicit CryptoProvider since v0.23
# Multiple transitive deps enable both ring and aws-lc-rs, so we pin ring
rustls = { version = "0.23", default-features = false, features = ["ring", "logging", "std", "tls12"] }
keyring = { version = "3", features = ["apple-native", "linux-native", "windows-native"] }
zeroize = "1"

# File watcher (skill hot-reload)
notify = "8"

# Streaming support
tokio-stream = "0.1"

# Cron scheduling
cron = "0.15"

# =============================================================================
# OPTIONAL DEPENDENCIES (feature-gated)
# =============================================================================

# --- CLI feature ---
clap = { version = "4", features = ["derive"], optional = true }
ratatui = { version = "0.30", optional = true }
crossterm = { version = "0.29", optional = true }

# --- Web UI feature ---
axum = { version = "0.8", features = ["ws", "multipart"], optional = true }
tower = { version = "0.5", optional = true }
tower-http = { version = "0.6", features = ["cors", "trace"], optional = true }
rust-embed = { version = "8", features = ["compression"], optional = true }
mime_guess = { version = "2", optional = true }
pulldown-cmark = { version = "0.13", optional = true }
hyper-util = { version = "0.1", features = ["tokio", "server-auto", "http1", "http2"], optional = true }

# --- Shell tool feature ---
regex = { version = "1" }

# --- OpenAI-compatible providers (streaming) ---
eventsource-stream = { version = "0.2", optional = true }
pin-project-lite = { version = "0.2", optional = true }

# --- Telegram channel ---
frankenstein = { version = "0.49", default-features = false, features = ["client-reqwest"], optional = true }

# --- Discord channel ---
serenity = { version = "0.12", default-features = false, features = ["client", "gateway", "model", "cache", "rustls_backend"], optional = true }

# --- WhatsApp channel ---
wa-rs = { git = "https://github.com/homunbot/wa-rs", rev = "d369582", optional = true }
wa-rs-sqlite-storage = { git = "https://github.com/homunbot/wa-rs", rev = "d369582", optional = true }
wa-rs-tokio-transport = { git = "https://github.com/homunbot/wa-rs", rev = "d369582", optional = true }
wa-rs-ureq-http = { git = "https://github.com/homunbot/wa-rs", rev = "d369582", optional = true }
wa-rs-core = { git = "https://github.com/homunbot/wa-rs", rev = "d369582", optional = true }
wa-rs-proto = { git = "https://github.com/homunbot/wa-rs", rev = "d369582", optional = true }
futures-util = { version = "0.3", optional = true }
tokio-tungstenite = { version = "0.28", features = ["rustls-tls-webpki-roots"] }

# --- Embeddings (HNSW vector index + cache) ---
usearch = { version = "2", optional = true }
lru = { version = "0.16", optional = true }

# --- Advanced document parsers (feature-gated under embeddings) ---
pdf-extract = { version = "0.10", optional = true }
calamine = { version = "0.32", optional = true }
zip = { version = "2", optional = true, default-features = false, features = ["deflate"] }
quick-xml = { version = "0.37", optional = true }

# --- MCP client (also powers browser via @playwright/mcp) ---
rmcp = { version = "0.16", features = ["client", "transport-child-process", "transport-streamable-http-client-reqwest", "reqwest"], optional = true }

# --- Vault 2FA ---
totp-rs = { version = "5", features = ["qr"], optional = true }
rand = "0.8"

# --- Email channel ---
lettre = { version = "0.11", optional = true, default-features = false, features = ["builder", "smtp-transport", "rustls-tls"] }
mail-parser = { version = "0.11", optional = true }
async-imap = { version = "0.11", optional = true, default-features = false, features = ["runtime-tokio"] }
tokio-rustls = { version = "0.26", optional = true, features = ["ring"] }
rustls-pki-types = { version = "1", features = ["std"], optional = true }
rcgen = { version = "0.13", optional = true }
webpki-roots = { version = "0.26", optional = true }

# --- Skill installer (archive extraction) ---
flate2 = "1"
tar = "0.4"

# --- OCR temp files ---
tempfile = "3"

[dev-dependencies]
serial_test = "3"

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.52", features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_JobObjects",
    "Win32_System_Threading",
] }

# =============================================================================
# RELEASE PROFILES
# =============================================================================

# Default release: balanced optimization
[profile.release]
opt-level = "z"        # Optimize for size
lto = "fat"            # Maximum cross-crate optimization
codegen-units = 1      # Serialized codegen for smaller binary
strip = true           # Remove debug symbols
panic = "abort"        # Reduce binary size

# Fast release: faster builds, larger binary
[profile.release-fast]
inherits = "release"
codegen-units = 8      # Parallel codegen for faster builds
opt-level = 3          # Speed over size
lto = "thin"           # Much faster than fat LTO

# Dev-test: fast compile, reasonable runtime speed (for manual testing)
[profile.dev-test]
inherits = "dev"
opt-level = 1          # Basic optimizations (crypto/network usable)
debug = "line-tables-only"  # Minimal debug info, faster linking

# =============================================================================
# PACKAGING — cargo-deb (Debian/Ubuntu .deb)
# =============================================================================
# Build with: cargo deb --no-build --target x86_64-unknown-linux-gnu
# (The `--no-build` flag reuses an already-built release binary; omit it
# for a clean build.) Output lands in target/debian/homun_<ver>_<arch>.deb.
#
# The package installs:
#   /usr/bin/homun                      — the binary
#   /lib/systemd/system/homun.service   — system-level systemd unit
#   /usr/share/doc/homun/               — README + copyright + changelog
#
# Maintainer scripts in packaging/linux/debian/ create a dedicated
# `homun` system user with home dir at /var/lib/homun (see postinst).
[package.metadata.deb]
name = "homun"
maintainer = "Homun Maintainers <hello@homun.dev>"
copyright = "2026, Homun Maintainers <hello@homun.dev>"
license-file = ["LICENSE", "0"]
extended-description = """
Homun is a personal AI assistant that lives on your machine and works
24/7. It's a single Rust binary you can manage via Telegram, WhatsApp,
Discord, Slack, Email, a web UI, or the CLI. Local-first, privacy-focused,
and powered by the open Agent Skills standard.
"""
section = "misc"
priority = "optional"
# Runtime deps: ca-certificates for HTTPS to LLM providers, libssl for TLS,
# adduser for the system user created in postinst.
depends = "adduser, ca-certificates, libsqlite3-0"
# Generated by cargo-deb from the Rust binary + our assets.
# Format: ["source", "destination", "mode"]
assets = [
    ["target/release/homun", "usr/bin/homun", "755"],
    ["packaging/linux/homun.service", "lib/systemd/system/homun.service", "644"],
    ["README.md", "usr/share/doc/homun/README.md", "644"],
]
maintainer-scripts = "packaging/linux/debian/"
# Conf files survive `apt remove` (without --purge); we don't have any
# shipped conf files today — users create ~/.homun/config.toml themselves.
conf-files = []

# =============================================================================
# PACKAGING — cargo-generate-rpm (Fedora/RHEL/openSUSE .rpm)
# =============================================================================
# Build with: cargo generate-rpm --target x86_64-unknown-linux-gnu
# Output lands in target/generate-rpm/homun-<ver>-1.<arch>.rpm.
#
# cargo-generate-rpm is much simpler than cargo-deb: no separate maintainer
# scripts dir, scripts are inlined via post_install_script / pre_uninstall_script.
# The homun.service unit is installed to the standard RPM systemd location.
[package.metadata.generate-rpm]
name = "homun"
license = "PolyForm-Noncommercial-1.0.0"
summary = "Ultra-lightweight personal AI assistant"
# Runtime deps for RPM-based distros
requires = { "shadow-utils" = "*", "systemd" = "*", "ca-certificates" = "*", "sqlite-libs" = "*" }
# Assets: same layout as the .deb but RPM uses /usr/lib/systemd/system
assets = [
    { source = "target/release/homun", dest = "/usr/bin/homun", mode = "755" },
    { source = "packaging/linux/homun.service", dest = "/usr/lib/systemd/system/homun.service", mode = "644" },
    { source = "README.md", dest = "/usr/share/doc/homun/README.md", mode = "644", doc = true },
    { source = "LICENSE", dest = "/usr/share/doc/homun/LICENSE", mode = "644", doc = true },
]
# Inline maintainer scripts (equivalent logic to the .deb scripts)
post_install_script = """
getent passwd homun >/dev/null 2>&1 || \
    useradd --system --home-dir /var/lib/homun --shell /sbin/nologin \
            --comment "Homun AI assistant" homun
install -d -o homun -g homun -m 750 /var/lib/homun
install -d -o homun -g homun -m 750 /var/lib/homun/.homun
systemctl daemon-reload || true
"""
pre_uninstall_script = """
if [ "$1" = "0" ]; then
    systemctl stop homun.service 2>/dev/null || true
    systemctl disable homun.service 2>/dev/null || true
fi
"""
post_uninstall_script = """
if [ "$1" = "0" ]; then
    systemctl daemon-reload 2>/dev/null || true
fi
"""
